<style>

  --ink: #1d2733; --ink-2: #384250; --muted: #9298a2;

* { box-sizing: border-box; margin: 0; }

@media (max-width: 920px) { .homebtn { top: 58px; } }

main { max-width: 980px; margin: 0 auto; padding: 24px 24px 60px; }
.searchwrap { position: relative; margin: 20px 0 8px; background: var(--sky); border-radius: 24px; padding: 16px; }

#q:focus { outline: 2px solid #04a7e1; border-color: transparent; }
#sugg { position: absolute; left: 16px; right: 16px; top: 100%; margin-top: 2px; background: var(--plane); border: 1px solid var(--grid); border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,.12); z-index: 10; overflow: hidden; max-height: 320px; overflow-y: auto; }

.tile .l { color: var(--ink-2); font-size: clamp(13px, 1.5vw, 15px); position: absolute; bottom: 30px; left: 12px; right: 12px; margin-top: 0 !important; }
@media (max-width: 700px) { .tiles { grid-template-columns: 1fr; } .tile { aspect-ratio: auto; padding: 28px 16px 64px; } }
.section-div { display: flex; align-items: center; gap: 14px; margin: 36px 0 18px; color: var(--muted); font-size: 13.5px; }
.section-div::before, .section-div::after { content: ""; flex: 1; border-top: 1px solid var(--grid); }
.fnote { color: var(--muted); font-size: 12.5px; margin: -8px 0 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.fnote button { font: inherit; font-size: 12.5px; color: var(--accent); background: none; border: 1px solid var(--grid); border-radius: 999px; padding: 3px 12px; cursor: pointer; }

@media (max-width: 620px) { .pk-years { grid-template-columns: 1fr; } .pk-y:last-child { display: none; } }

.pk-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 10px; flex-wrap: wrap; }

.sc-chip.on { background: var(--bar); border-color: var(--bar); color: #fff; }
.sc-chip:hover:not(.on) { border-color: var(--bar); }
.rg-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
@media (max-width: 620px) { .rg-grid { grid-template-columns: repeat(3, 1fr); } }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 760px) { .grid2 { grid-template-columns: 1fr; } }
.card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 16px; }
.card h2 { font-size: 15px; margin-bottom: 12px; }
.card h2 .note { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
.bars { display: grid; gap: 10px; }
.brow { display: grid; grid-template-columns: 150px 1fr; align-items: center; gap: 10px; font-size: 13.5px; }
.brow .lbl { color: var(--ink); font-weight: 500; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.brow .lbl a { color: var(--ink); }
.brow .track { display: flex; align-items: center; gap: 9px; height: 20px; }
.brow .fill { display: block; height: 100%; border-radius: 999px; min-width: 8px; max-width: calc(100% - 44px); flex: 0 0 auto; transition: opacity .1s; }
.brow:hover .fill { opacity: .82; }
.brow.rowlink { cursor: pointer; border-radius: 12px; }
.brow.rowlink:hover .lbl { color: var(--accent); }
.brow.rowlink:hover .val { color: var(--accent); }
.brow .val { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
.tablewrap { overflow-x: auto; }
table { width: 100%; min-width: 680px; border-collapse: collapse; font-size: 13.5px; }
th { text-align: left; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--baseline); padding: 6px 8px; }
td { border-bottom: 1px solid var(--grid); padding: 8px; vertical-align: top; word-break: keep-all; }
td:first-child { min-width: 130px; }
tr:hover td { background: var(--plane); }
.chip { display: inline-block; background: var(--mint-bg); border: 1px solid var(--mint-line); border-radius: 999px; padding: 1px 9px; font-size: 12px; color: var(--mint); margin: 1px 2px 1px 0; }
a.chip:hover { border-color: var(--mint); text-decoration: none; }

.crumb { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

.empty { color: var(--muted); padding: 30px 0; text-align: center; }
footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; }
</style>
</head>

<header>

    홈

  <h1>공교육 에듀테크 활용 현황</h1>
  <div class="sub">전국 초·중·고등학교의 에듀테크 (학습지원 소프트웨어) 도입 현황을 조달·공개자료 기반으로 제공합니다</div>

<main>
  <div class="searchwrap">
    <input id="q" type="search" placeholder="학교명 또는 제품명 검색 (예: 서울과학고, ChatGPT)" autocomplete="off">

    제품명 미확인 계약, 해외 직접결제, 사비 구매 등은 포함되지 않으며, 실제 활용 규모는 제공된 자료와 다를 수 있습니다.
  </div>

<script>
const R = DB.records;
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const count = (arr, key) => { const m = new Map(); for (const x of arr) { const k = key(x); if (!k) continue; m.set(k, (m.get(k)||0)+1); } return [...m.entries()].sort((a,b)=>b[1]-a[1]); };
const uniq = arr => [...new Set(arr)];

// ---- 인덱스 ----
const schools = uniq(R.map(r => r.school)).sort();
const tags = count(R.flatMap(r => r.tags.map(t => [t])), x => x[0]);
const schoolCountByTag = t => uniq(R.filter(r => r.tags.includes(t)).map(r => r.school)).length;
const IDX = DB.schoolIndex || [];
const idxByCode = new Map(IDX.map(s => [s.c, s]));
const recordCodes = new Set(R.map(r => r.schoolCode).filter(Boolean));

// ---- 차트 부품 ----
const BAR_FROM = [43, 89, 216], BAR_TO = [79, 197, 150];
function barColor(i, n) {
  const t = n <= 1 ? 0 : i / (n - 1);
  const c = BAR_FROM.map((f, j) => Math.round(f + (BAR_TO[j] - f) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function barChart(pairs, {linkFn, max: mx, drillFn} = {}) {
  const max = mx || Math.max(...pairs.map(p => p[1]), 1);
  const n = pairs.length;
  return `<div class="bars">` + pairs.map(([k, v], i) => `
    <div class="brow${drillFn ? " rowlink" : ""}"${drillFn ? ` onclick="location.hash='${drillFn(k)}'" role="link" tabindex="0" title="누르면 해당 학교 목록을 보여줍니다"` : ""}>
      <span class="lbl" title="${esc(k)}">${linkFn ? `<a href="${linkFn(k)}">${esc(k)}</a>` : esc(k)}</span>
      <span class="track"><span class="fill" style="width:${(v/max*100).toFixed(1)}%;background:${barColor(i, n)}"></span><span class="val">${v}</span></span>
    </div>`).join("") + `</div>`;
}
function recordTable(recs, {showSchool = true} = {}) {
  if (!recs.length) return `<div class="empty">해당 기록이 없습니다</div>`;
  return `<div class="tablewrap"><table><thead><tr>${showSchool ? "<th>학교</th>" : ""}<th>제품/서비스</th><th>시기</th><th>내용</th><th>출처</th></tr></thead><tbody>` +
    recs.map(r => `<tr>
      ${showSchool ? `<td><a href="#/school/${encodeURIComponent(r.school)}">${esc(r.school)}</a><div class="conf">${esc(r.type)} · ${esc(r.region)}</div></td>` : ""}
      <td>${esc(r.product)}<div>${r.tags.map(t => `<a class="chip" href="#/tag/${encodeURIComponent(t)}">${esc(t)}</a>`).join("")}</div></td>
      <td style="white-space:nowrap">${esc(r.period)}</td>
      <td style="max-width:320px">${esc(r.content)}<div class="conf">신뢰도 ${esc(r.confidence)}</div></td>
      <td>${r.url && !/S2B|나라장터/i.test(r.sourceType) ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.sourceType)}</a>` : esc(r.sourceType)}</td>
    </tr>`).join("") + `</tbody></table></div>`;
}

// ---- 기간 필터 ----
let PF = "", PT = "";  // "YYYY-MM"
window.setPF = v => { PF = v; render(); };
window.setPT = v => { PT = v; render(); };
window.clearPeriod = () => { PF = ""; PT = ""; render(); };
const ymInt = s => s ? parseInt(s.replace("-", ""), 10) : null;
const YM_MIN = 202301, YM_MAX = 202607;
let pkS = null, pkE = null, pkBase = 2025;
const ymStr = ym => `${Math.floor(ym / 100)}-${String(ym % 100).padStart(2, "0")}`;
const ymKo = ym => `${Math.floor(ym / 100)}.${String(ym % 100).padStart(2, "0")}`;
window.openPicker = () => {
  pkS = ymInt(PF); pkE = ymInt(PT);
  pkBase = pkS ? Math.min(Math.max(Math.floor(pkS / 100), 2023), 2025) : 2025;
  drawPicker();
};
window.closePicker = () => { document.getElementById("pickerRoot").innerHTML = ""; };
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.getElementById("pickerRoot").innerHTML) closePicker();
});
window.pkShift = d => { pkBase = Math.min(2025, Math.max(2023, pkBase + d)); drawPicker(); };
window.pkPick = ym => {
  if (pkS !== null && pkE === null && ym >= pkS) pkE = ym;
  else { pkS = ym; pkE = null; }
  drawPicker();
};
window.pkAll = () => { PF = ""; PT = ""; closePicker(); render(); };
window.pkApply = () => {
  if (pkS === null) return;
  PF = ymStr(pkS); PT = ymStr(pkE !== null ? pkE : pkS);
  closePicker(); render();
};
// ---- 학교 계열 필터 (부모 6칸 + 세부 잎사귀) ----
const LEAVES = [
  {k: "elem", label: "초등학교", parent: "elem"},
  {k: "mid", label: "중학교", parent: "mid"},
  {k: "gen", label: "일반고", parent: "gen"},
  {k: "voc_v", label: "특성화고", parent: "voc"},
  {k: "voc_m", label: "마이스터고", parent: "voc"},
  {k: "spc_sci", label: "과학고·영재학교", parent: "spc"},
  {k: "spc_lang", label: "외국어고·국제고", parent: "spc"},
  {k: "spc_art", label: "예술고·체육고", parent: "spc"},
  {k: "aut", label: "자율고", parent: "aut"},
];
const PARENTS = [
  {k: "elem", label: "초등학교"}, {k: "mid", label: "중학교"}, {k: "gen", label: "일반고"},
  {k: "voc", label: "특성화고·마이스터고"}, {k: "spc", label: "특목고"}, {k: "aut", label: "자율고"},
];
const leafLabel = {}, parentOf = {}, parentLabel = {};
LEAVES.forEach(l => { leafLabel[l.k] = l.label; parentOf[l.k] = l.parent; });
PARENTS.forEach(p => parentLabel[p.k] = p.label);
const leavesOf = p => LEAVES.filter(l => l.parent === p).map(l => l.k);

function spcLeaf(name, detail) {
  const d = detail || "";
  if (d.includes("과학")) return "spc_sci";
  if (d.includes("외국어") || d.includes("국제")) return "spc_lang";
  if (d.includes("예술") || d.includes("체육")) return "spc_art";
  if (/영재|과학고/.test(name)) return "spc_sci";
  if (/외국어고|국제고/.test(name)) return "spc_lang";
  if (/예술고|예고|체육고|국악고/.test(name)) return "spc_art";
  return "spc_sci";
}
const idxGroup = s => s.l === "초등학교" ? "elem" : s.l === "중학교" ? "mid"
  : s.m ? "voc_m" : s.h === "특성화고" ? "voc_v"
  : s.h === "특목고" ? spcLeaf(s.n, s.d) : s.h === "자율고" ? "aut" : "gen";
function recLeaf(r) {
  const t = r.type;
  if (t === "초등학교") return "elem";
  if (t === "중학교") return "mid";
  if (t === "일반고") return "gen";
  if (t === "자율고") return "aut";
  if (t === "특성화고" || t === "특성화고·마이스터고") return "voc_v";
  if (t === "마이스터고") return "voc_m";
  if (t === "과학고" || t === "영재학교") return "spc_sci";
  if (t === "특목고") {

const ALIAS_GROUPS = [
  ["chatgpt", "챗gpt", "챗지피티", "쳇gpt"],
  ["adobe", "어도비"], ["photoshop", "포토샵"], ["illustrator", "일러스트레이터"],
  ["claude", "클로드"], ["gemini", "제미나이", "제미니"], ["copilot", "코파일럿"],
  ["microsoft", "마이크로소프트"], ["office", "오피스"], ["zoom", "줌"],
  ["notion", "노션"], ["padlet", "패들렛"], ["canva", "캔바"],
  ["goorm", "구름"], ["replit", "리플릿"], ["copykiller", "카피킬러"],
  ["google", "구글"], ["classroom", "클래스룸"], ["workspace", "워크스페이스"],
  ["suno", "수노"], ["aidt", "디지털교과서"],
];
function queryTerms(q) {
  const terms = new Set([q]);
  for (const g of ALIAS_GROUPS) {
    for (const m of g) {
      if (q.includes(m)) g.forEach(o => { if (o !== m) terms.add(q.replace(m, o)); });
    }
  }
  return [...terms];
}
function searchView(q) {
  const terms = queryTerms(q.toLowerCase());
  const recs = R.filter(r => {
    const hay = (r.school + r.product + r.content + r.tags.join("")).toLowerCase();
    return terms.some(t => hay.includes(t));
  });
  return `
    <div class="crumb"><a href="#/">홈</a> › 검색 결과</div>
    <div class="pagehead"><h2>“${esc(q)}” 검색 결과</h2><div class="meta">${recs.length.toLocaleString()}건${terms.length > 1 ? ` · 유사 표기 포함: ${terms.filter(t => t !== q.toLowerCase()).map(esc).join(", ")}` : ""}</div></div>
    <div class="card">${recordTable(recs.slice(0, 200))}</div>
    ${recs.length > 200 ? `<div class="empty">상위 200건만 표시합니다</div>` : ""}`;
}

function animateCount() {
  const el = document.getElementById("cntSchools");
  if (!el) return;
  const target = +el.dataset.target;
  const dur = 1500, t0 = performance.now();
  function tick(t) {
    const p = Math.min((t - t0) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * eased).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function render() {
  const seg = (location.hash.slice(1) || "/").split("/");
  const kind = seg[1];
  const arg = seg.length > 2 ? decodeURIComponent(seg.slice(2).join("/")) : undefined;
  const view = $("#view");
  if (kind === "school") view.innerHTML = schoolView(arg);
  else if (kind === "code") view.innerHTML = codeView(arg);
  else if (kind === "tag") view.innerHTML = tagView(arg);
  else if (kind === "drill") view.innerHTML = drillView(seg[2], decodeURIComponent(seg.slice(3).join("/")));
  else if (kind === "search") view.innerHTML = searchView(arg);
  else {
    view.innerHTML = homeView();
    animateCount();
    const qEl = document.querySelector("#q");
    if (qEl) { qEl.value = ""; }
    const sEl = document.querySelector("#sugg");
    if (sEl) { sEl.hidden = true; }
  }
  window.scrollTo(0, 0);
}

render();

// ---- 자동완성 ----
const groupBySchool = {};
R.forEach(r => { if (!(r.school in groupBySchool)) groupBySchool[r.school] = recLeaf(r); });
const suggItems = [
  ...tags.map(([t]) => ({label: t, kind: "제품군", href: `#/tag/${encodeURIComponent(t)}`})),
  ...schools.map(s => ({label: s, kind: "학교·기록 있음", href: `#/school/${encodeURIComponent(s)}`, g: groupBySchool[s], rg: (R.find(r => r.school === s) || {}).sido})),
  ...IDX.filter(s => !recordCodes.has(s.c)).map(s => ({label: s.n, kind: `${s.s} ${s.h || s.l}`, href: `#/code/${s.c}`, g: idxGroup(s), rg: s.s})),
];
const q = $("#q"), sugg = $("#sugg");
let selIdx = -1, current = [];
q.addEventListener("input", () => {
  const v = q.value.trim().toLowerCase();
  selIdx = -1;
  if (!v) { sugg.hidden = true; return; }
  const vTerms = queryTerms(v);
  current = suggItems.filter(it => vTerms.some(t => it.label.toLowerCase().includes(t))
    && (!SF.size || !it.g || SF.has(it.g))
    && (!RG.size || !it.rg || RG.has(it.rg))).slice(0, 12);
  sugg.innerHTML = current.map((it, i) => `<div data-i="${i}"><span>${esc(it.label)}</span><span class="kind">${it.kind}</span></div>`).join("")
    + `<div data-i="-2"><span>“${esc(q.value.trim())}” 전체 검색</span><span class="kind">↵</span></div>`;
  sugg.hidden = false;
});
sugg.addEventListener("mousedown", e => {
  const el = e.target.closest("[data-i]"); if (!el) return;
  const i = +el.dataset.i;
  location.hash = i >= 0 ? current[i].href.slice(1) : `/search/${encodeURIComponent(q.value.trim())}`;
  sugg.hidden = true; q.blur();
});
q.addEventListener("keydown", e => {
  if (e.isComposing || e.keyCode === 229) return;  // 한글 IME 조합 중 Enter/방향키 무시 (글자 중복 방지)
  if (sugg.hidden) { if (e.key === "Enter" && q.value.trim()) { location.hash = `/search/${encodeURIComponent(q.value.trim())}`; } return; }
  const n = current.length;
  if (e.key === "ArrowDown") { selIdx = (selIdx + 1) % n; }
  else if (e.key === "ArrowUp") { selIdx = (selIdx - 1 + n) % n; }
  else if (e.key === "Enter") {
    location.hash = selIdx >= 0 ? current[selIdx].href.slice(1) : `/search/${encodeURIComponent(q.value.trim())}`;
    sugg.hidden = true; q.blur(); return;
  } else if (e.key === "Escape") { sugg.hidden = true; return; }
  else return;
  e.preventDefault();
  [...sugg.children].forEach((el, i) => el.classList.toggle("sel", i === selIdx));
});
document.addEventListener("click", e => { if (!e.target.closest(".searchwrap")) sugg.hidden = true; });
</script>
</body>
</html>
